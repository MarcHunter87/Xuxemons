<main class="home-main">
  <section class="page-hero page-hero--stacked" aria-labelledby="hero-title">
    <h1 id="hero-title">
      <span class="page-hero-title-black">Discover &amp; Battle</span>
      <span class="page-hero-title-blue">Legendary Creatures</span>
    </h1>
    <p class="page-hero-desc">
      Welcome to the ultimate Xuxemon adventure. Collect rare species, master the elements, and rise to the top of the global leaderboards.
    </p>
  </section>

  <section class="stats-row" aria-label="Trainer level and win streak">
    <app-trainer-lvl [statsReady]="statsReady()"></app-trainer-lvl>
    <app-win-streak-v1 [statsReady]="statsReady()"></app-win-streak-v1>
  </section>
</main>
