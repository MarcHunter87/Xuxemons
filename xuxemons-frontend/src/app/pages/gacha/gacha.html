<div class="gacha-container">
    <h1 class="main-title">Gacha Xuxemon</h1>
    <p class="subtitle">¡Prueba tu suerte y consigue un nuevo Xuxemon!</p>

    <div class="roulette-box">
        <div class="roulette-track" [class.spinning]="isSpinning()" [style.transform]="trackTransform()">
            <div *ngFor="let item of rouletteItems()" class="roulette-item"
                [style.background-color]="getTypeColor(item.type.name)">
                <img [src]="item.image_url" [alt]="item.name">
                <span>{{ item.name }}</span>
            </div>
        </div>
        <div class="roulette-pointer"></div>
    </div>

    <button class="spin-button" [disabled]="isSpinning()" (click)="spin()">
        {{ isSpinning() ? 'Girando...' : 'Girar Ruleta' }}
    </button>

    <div class="modal-overlay" *ngIf="showAward()">
        <div class="modal-content">
            <h1 class="main-title">¡FELICIDADES!</h1>
            <p class="subtitle">Has conseguido un nuevo Xuxemon:</p>

            <div class="winner-display">
                <div class="image-wrapper">
                    <img [src]="awardedXuxemon()?.image_url" [alt]="awardedXuxemon()?.name"
                        [style.filter]="'drop-shadow(0 0 35px ' + getTypeColor(awardedXuxemon()?.type?.name || '') + '80)'">
                </div>
                <h2 class="winner-name">{{ awardedXuxemon()?.name }}</h2>
                <span class="type-badge" [style.background-color]="getTypeColor(awardedXuxemon()?.type?.name || '')">
                    {{ awardedXuxemon()?.type?.name }}
                </span>
            </div>

            <button class="btn-primary recoger-button" (click)="closeModal()">
                RECOGER
            </button>
        </div>
    </div>

    <div class="toast" *ngIf="toastXuxemon()">
        <img [src]="toastXuxemon()?.image_url" [alt]="toastXuxemon()?.name">
        <div class="toast-text">
            Has conseguido {{ toastXuxemon()?.name }}
        </div>
    </div>
</div>
