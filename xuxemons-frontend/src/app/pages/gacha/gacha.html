<div class="gacha-container">
    <h1 class="main-title">Gacha</h1>
    <p class="subtitle">Try your luck!</p>

    <div *ngIf="isDataLoaded() && rouletteItems().length === 0" class="empty-db-message">
        <h2>No Xuxemons available</h2>
    </div>

    <ng-container *ngIf="rouletteItems().length > 0">
        <div class="roulette-box">
            <div class="roulette-track" [class.spinning]="isSpinning()" [style.transform]="trackTransform()">
                <div *ngFor="let item of rouletteItems()" class="roulette-item"
                    [style.background-color]="getTypeColor(item.type.name)">
                    <img [src]="item.image_url" [alt]="item.name">
                    <span>{{ item.name }}</span>
                </div>
            </div>
            <div class="roulette-pointer"></div>
        </div>

        <button class="spin-button" [disabled]="isSpinning()" (click)="spin()">
            Spin
        </button>
    </ng-container>

    <div *ngIf="showAward()" style="margin-top: 20px; padding: 20px; border: 2px solid #ccc; border-radius: 10px; text-align: center; background: #fff;">
        <h2>Has recibido: {{ awardedXuxemon()?.name }}</h2>
        <img [src]="awardedXuxemon()?.image_url" [alt]="awardedXuxemon()?.name" style="width: 150px; height: 150px; margin: 10px 0;">
        <br>
        <button (click)="closeModal()" class="btn-primary" style="padding: 10px 30px; font-size: 1.2rem;">OK</button>
    </div>
</div>
