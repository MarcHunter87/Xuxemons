<header class="navbar" role="banner">
  <div class="navbar-inner">

    <a class="brand" routerLink="/" aria-label="Xuxemons Home">
      <img src="/icons/logo%20v2.svg" alt="Xuxemons logo">
      <span class="brand-name">XUXEMONS</span>
    </a>

    <nav aria-label="Main navigation">
      <ul class="nav-links" role="list">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        </li>
        <li><a routerLink="/battle" routerLinkActive="active">Battle</a></li>
        <li><a routerLink="/xuxedex" routerLinkActive="active">Xuxedex</a></li>
        <li><a routerLink="/inventory" routerLinkActive="active">Inventory</a></li>
      </ul>
    </nav>

    <div class="navbar-right">
      @if (isAdmin) {
        <a routerLink="/admin" class="icon-btn" aria-label="Admin panel">
          <i class="bi bi-shield-fill-check"></i>
        </a>
      }
      <a routerLink="/friends" class="icon-btn" aria-label="Friends">
        <i class="bi bi-people-fill"></i>
      </a>
      <a routerLink="/profile" routerLinkActive="active" class="profile-link" aria-label="My Profile">
        <div class="avatar" aria-hidden="true">
          @if (iconUrl && !iconLoadError) {
            <img [src]="iconUrl" alt="Profile icon" (error)="iconLoadError = true">
          } @else {
            <i class="bi bi-person-fill"></i>
          }
        </div>
        <div class="profile-info">
          <span class="profile-name">{{ displayName }}</span>
          <span class="profile-sub">My Profile</span>
        </div>
      </a>
    </div>

  </div>
</header>
