<div class="xuxedex-search">
  <h2 id="xuxedex-search-heading" class="search-label">Search Xuxemons</h2>
  <div class="filter-controls">
    <div class="search-box">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        id="xuxedex-search-input"
        type="text"
        placeholder="Search by name..."
        aria-labelledby="xuxedex-search-heading"
        [ngModel]="searchQuery"
        (ngModelChange)="onSearchChange($event)"
      >
    </div>

    <div class="select-box">
      <select [ngModel]="selectedType" (ngModelChange)="onTypeChange($event)">
        <option value="">All Types</option>
        @for (type of typeOptions; track type) {
        <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>

    <div class="select-box">
      <select [ngModel]="selectedSize" (ngModelChange)="onSizeChange($event)">
        <option value="">All Sizes</option>
        @for (size of sizeOptions; track size) {
        <option [value]="size">{{ size }}</option>
        }
      </select>
    </div>
  </div>
</div>
