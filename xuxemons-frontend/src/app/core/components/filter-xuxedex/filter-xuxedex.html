<div class="xuxedex-header-container">
    <div class="xuxedex-text-content">
        <h1 class="main-title">Xuxedex Collection</h1>
        <p class="subtitle">Discover and collect all the unique Xuxemons.</p>

        <div class="filter-controls">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search Xuxemons...">
            </div>

            <div class="select-box">
                <select id="TypeXuxemon">
                    <option value="">All Types</option>
                    <option value="Power">Power</option>
                    <option value="Speed">Speed</option>
                    <option value="Technical">Technical</option>
                </select>
            </div>
        </div>
    </div>

    <div class="type-relation-container">
        <img src="http://localhost:8080/badges/Tabla%20De%20Tipos.png" alt="Type Table" class="type-table-img">
    </div>
</div>
