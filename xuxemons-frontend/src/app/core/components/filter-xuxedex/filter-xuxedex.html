<div class="filter-section">
  <h2 id="xuxedex-search-heading" class="filter-label">SEARCH XUXEMON</h2>
  <div class="filter-controls">
    <div class="search-box">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        id="xuxedex-search-input"
        type="text"
        placeholder="Search by name..."
        aria-labelledby="xuxedex-search-heading"
        [(ngModel)]="searchInput"
        (keydown.enter)="applySearchOnEnter(); $event.preventDefault()"
      >
    </div>

    <div class="select-box">
      <div class="custom-select" (focusout)="onPanelFocusOut($event, 'type')">
        <button
          type="button"
          id="xuxedex-filter-type"
          class="custom-select-trigger"
          [attr.aria-expanded]="openPanel() === 'type'"
          aria-haspopup="listbox"
          aria-label="Filter by type"
          (click)="togglePanel('type')"
          (focus)="openTypeOnFocus()"
        >
          <span class="custom-select-label">
            @if (!appliedType) {
              <span class="custom-select-placeholder">All Types</span>
            } @else {
              <span>{{ appliedType }}</span>
            }
          </span>
          <i class="bi bi-chevron-down" aria-hidden="true"></i>
        </button>
        @if (openPanel() === 'type') {
          <div class="custom-select-backdrop" (click)="closePanels()" aria-hidden="true"></div>
          <ul class="custom-select-list" role="listbox" aria-labelledby="xuxedex-filter-type">
            <li
              role="option"
              tabindex="0"
              [attr.aria-selected]="!appliedType"
              class="custom-select-option"
              (keydown.enter)="commitTypeAndClose(''); $event.preventDefault()"
              (click)="commitTypeAndClose('')"
            >
              <span>All Types</span>
            </li>
            @for (type of typeOptions; track type) {
              <li
                role="option"
                tabindex="0"
                [attr.aria-selected]="appliedType === type"
                class="custom-select-option"
                (keydown.enter)="commitTypeAndClose(type); $event.preventDefault()"
                (click)="commitTypeAndClose(type)"
              >
                <span>{{ type }}</span>
              </li>
            }
          </ul>
        }
      </div>
    </div>

    <div class="select-box">
      <div class="custom-select" (focusout)="onPanelFocusOut($event, 'size')">
        <button
          type="button"
          id="xuxedex-filter-size"
          class="custom-select-trigger"
          [attr.aria-expanded]="openPanel() === 'size'"
          aria-haspopup="listbox"
          aria-label="Filter by size"
          (click)="togglePanel('size')"
          (focus)="openSizeOnFocus()"
        >
          <span class="custom-select-label">
            @if (!appliedSize) {
              <span class="custom-select-placeholder">All Sizes</span>
            } @else {
              <span>{{ appliedSize }}</span>
            }
          </span>
          <i class="bi bi-chevron-down" aria-hidden="true"></i>
        </button>
        @if (openPanel() === 'size') {
          <div class="custom-select-backdrop" (click)="closePanels()" aria-hidden="true"></div>
          <ul class="custom-select-list" role="listbox" aria-labelledby="xuxedex-filter-size">
            <li
              role="option"
              tabindex="0"
              [attr.aria-selected]="!appliedSize"
              class="custom-select-option"
              (keydown.enter)="commitSizeAndClose(''); $event.preventDefault()"
              (click)="commitSizeAndClose('')"
            >
              <span>All Sizes</span>
            </li>
            @for (size of sizeOptions; track size) {
              <li
                role="option"
                tabindex="0"
                [attr.aria-selected]="appliedSize === size"
                class="custom-select-option"
                (keydown.enter)="commitSizeAndClose(size); $event.preventDefault()"
                (click)="commitSizeAndClose(size)"
              >
                <span>{{ size }}</span>
              </li>
            }
          </ul>
        }
      </div>
    </div>
  </div>
</div>
