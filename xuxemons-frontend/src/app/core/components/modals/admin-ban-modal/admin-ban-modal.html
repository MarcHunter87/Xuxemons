<div class="admin-ban-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="admin-ban-title" (click)="onBackdropClick()" (keydown)="onModalKeydown($event)">
  <div #dialogRoot class="admin-ban-modal-shell" tabindex="-1">
    <div class="modal fade show d-block admin-ban-modal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="admin-ban-title">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content admin-ban-content animate-pop" (click)="$event.stopPropagation()">
          <div class="modal-header border-0 pb-0">
            <h2 class="modal-title h4 mb-0 d-flex align-items-center gap-2" id="admin-ban-title">
              <i class="bi bi-person-fill-slash" aria-hidden="true"></i>
              Ban player
            </h2>
          </div>

          <div class="modal-body">
            <p>Are you sure you want to ban <strong>{{ userName }}</strong>? This action cannot be undone from this panel.</p>
          </div>

          <div class="modal-footer border-0 pt-0 admin-ban-footer">
            <button type="button" class="btn-secondary" (click)="closeModal.emit()">Cancel</button>
            <button type="button" class="btn-danger" (click)="onConfirmClick()">
              Confirm ban
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
