<div class="confirm-overlay" role="dialog" aria-modal="true" (click)="onBackdropClick()" (keydown)="onModalKeydown($event)">
  <div #dialogRoot class="confirm-dialog-shell" tabindex="-1">
    <div class="confirm-dialog animate-pop" (click)="$event.stopPropagation()">
      <h3 id="confirm-title" class="confirm-title">Remove friend?</h3>
      <p class="confirm-text">
        Are you sure you want to remove
        <strong>{{ friendName }}</strong>
        from your friends? This will also remove you from their list.
      </p>
      <div class="confirm-actions">
        <button type="button" class="btn-secondary" (click)="closeModal.emit()">Cancel</button>
        <button type="button" class="btn-danger" (click)="onConfirmClick()">Remove friend</button>
      </div>
    </div>
  </div>
</div>
