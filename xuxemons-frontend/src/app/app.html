@if (showLayout()) {
  <app-header></app-header>
}
@if (loadingService.isLoading()) {
  <div class="global-loading-overlay" aria-live="polite" aria-busy="true">
    <div class="global-loading-spinner" role="status" aria-label="Loading"></div>
  </div>
}
<main class="app-main">
  @if (showLayout()) {
    <div class="app-content" [class.profile-no-padding-bottom]="isProfilePage()">
      @if (showTopBreadcrumb()) {
        <app-breadcrumb></app-breadcrumb>
      }
      <router-outlet></router-outlet>
    </div>
  } @else {
    <router-outlet></router-outlet>
  }
</main>
@if (showLayout()) {
  <app-footer></app-footer>
}

<app-daily-noti-modal
  [open]="showDailyRewardsModal()"
  [notification]="pendingDailyRewards()"
  (closeModal)="onCloseDailyRewardsModal()">
</app-daily-noti-modal>

<app-friend-request-noti-modal
  [open]="showFriendRequestModal()"
  [requests]="pendingFriendRequests()"
  (closeModal)="onCloseFriendRequestModal()"
  (acceptRequest)="onAcceptFriendRequest($event)"
  (rejectRequest)="onRejectFriendRequest($event)">
</app-friend-request-noti-modal>
